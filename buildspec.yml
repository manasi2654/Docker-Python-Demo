version: 0.2

phases:
  install:
    runtime-versions:
      docker: 20

  pre_build:
    commands:
      - echo "Starting Docker build process"

  build:
    commands:
      - echo "Building Docker image"
      - docker build -t myapp .

      - echo "Running container"
      - docker run myapp

  post_build:
    commands:
      - echo "Build completed successfully"
